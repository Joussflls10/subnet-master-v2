<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubnetMaster v2 — Learn IPv4/IPv6 Subnetting &amp; Supernetting</title>
<style>
/* === SubnetMaster v2 — Dark Theme === */

:root {
  --bg: #0f1117;
  --surface: #1a1d24;
  --surface2: #252a33;
  --border: #30363d;
  --accent: #6e93f5;
  --accent2: #4ec9b0;
  --accent3: #ce9178;
  --danger: #f44747;
  --gold: #ffd700;
  --text: #d4d4d4;
  --muted: #7a8194;
  --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', Consolas, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.6;
  height: 100%;
  overflow-x: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Topbar ─── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.2rem;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

#topbar .brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent);
}

#topbar .progress-wrap {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex: 1;
  max-width: 400px;
  margin: 0 1.2rem;
}

#topbar .progress-track {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}

#topbar .progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent),  var(--accent2));
  border-radius: 4px;
  transition: width 0.4s ease;
}

#topbar .progress-pct {
  font-size: 0.85rem;
  color: var(--muted);
  min-width: 2.5rem;
  text-align: right;
  font-family: var(--mono);
}

#sidebar-toggle {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.35rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
}

/* ─── Sidebar ─── */
#sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 1rem 0;
  flex-shrink: 0;
  transition: transform 0.25s ease;
}

.mod-group {
  margin-bottom: 1rem;
}

.mod-title {
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 700;
}

.mod-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.lesson-btn {
  display: flex;
  align-items: stretch;
}

.lesson-btn button {
  width: 100%;
  text-align: left;
  padding: 0.55rem 1rem;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  color: var(--text);
  font-size: 0.92rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: background 0.15s, border-color 0.15s;
}

.lesson-btn button:hover:not(:disabled) {
  background: var(--surface2);
}

.lesson-btn.active button {
  background: var(--surface2);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.lesson-btn.completed button {
  border-left-color: var(--accent2);
  color: var(--accent2);
}

.lesson-btn.locked button {
  color: var(--muted);
  cursor: not-allowed;
  opacity: 0.6;
}

.lesson-num-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 0.72rem;
  font-family: var(--mono);
  flex-shrink: 0;
}

.lesson-btn.active .lesson-num-circle {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.lesson-btn.completed .lesson-num-circle {
  background: var(--accent2);
  color: var(--bg);
  border-color: var(--accent2);
}

/* ─── Main Layout ─── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 2rem;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

/* ─── Steps ─── */
.step {
  margin-bottom: 1.5rem;
  animation: fadeIn 0.35s ease;
}

.step-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
  font-size: 0.95rem;
}

.step-num-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  font-size: 0.8rem;
  font-family: var(--mono);
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.step.active .step-num-circle {
  border-color: var(--accent);
  color: var(--accent);
}

.step.done .step-num-circle {
  border-color: var(--accent2);
  color: var(--accent2);
}

.step-label {
  font-weight: 600;
}

.step-meta {
  margin-left: auto;
  color: var(--muted);
  font-size: 0.8rem;
  font-family: var(--mono);
}

.step-body {
  padding-left: 2.2rem;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Cards ─── */
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.1rem 1.3rem;
  line-height: 1.7;
}

.info-card h3 {
  margin-top: 0;
  color: var(--accent);
  font-size: 1.05rem;
}

.info-card code {

  padding: 0.15rem 0.35rem;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.9em;
}

.demo-card, .demo-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.1rem 1.3rem;
}

.demo-box label {

  margin-bottom: 0.3rem;
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 500;
}

.demo-box input, .demo-box select, .demo-box textarea {

  background: var(--bg);
  border: 1px solid var(--border);

}

.exercise-card, .exercise-box {

  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 1.3rem;
  position: relative;
  overflow: hidden;
}

.exercise-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;

}

.question {
  font-size: 1.05rem;
  margin-bottom: 1rem;
  line-height: 1.6;
}

.question code {
  background: var(--surface2);
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  font-family: var(--mono);
}

.fields {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.field-wrap label {
  display: block;
  margin-bottom: 0.25rem;
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 500;
}

.ex-input {
  width: 100%;
  max-width: 320px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.55rem 0.75rem;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.95rem;

  transition: border-color 0.15s, box-shadow 0.15s;

.ex-input:focus {

  box-shadow: 0 0 0 2px rgba(110, 147, 245, 0.15);

  box-shadow: 0 0 0 2px rgba(78, 201, 176, 0.15);

  margin-bottom: 0.6rem;

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
  padding: 0.55rem 1.1rem;
  border-radius: 6px;

  background: var(--surface2);
  color: var(--text);
  font-size: 0.92rem;

.btn:hover:not(:disabled) {

.btn:active:not(:disabled) {

}

.btn-primary {

  border-color: var(--accent);
  color: #fff;
  font-weight: 600;

.btn-primary:hover:not(:disabled) {

  border-color: #5a82e0;
}

.btn-success {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #0f1117;
  font-weight: 600;
}

  border-color: #3db89a;
}

  border-color: var(--accent3);
  color: var(--accent3);
}

  border-radius: 6px;
  font-size: 0.95rem;

  animation: fadeIn 0.25s ease;

  border: 1px solid var(--accent2);
  color: var(--accent2);

  border: 1px solid var(--danger);
  color: var(--danger);

.hint-text {
  margin-top: 0.5rem;
  color: var(--accent3);
  font-size: 0.9rem;

/* ─── Result Box ─── */
.result-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.9rem 1rem;
  margin-top: 0.6rem;

  font-size: 0.92rem;
  line-height: 1.6;
  white-space: pre-wrap;

.result-box.error {

  color: var(--danger);

  padding: 0.35rem 0.5rem;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.88rem;

  gap: 0.2rem;
  margin: 0.8rem 0;

  border-radius: 8px;

.diag-block {

  align-items: center;
  justify-content: center;
  padding: 0.4rem 0.6rem;
  font-family: var(--mono);
  font-size: 0.82rem;
  border-radius: 4px;
  min-width: 2.2rem;

.diag-net {

  border: 1px solid var(--accent);

}

.diag-host {

  border: 1px solid var(--accent2);

}

.diag-divider {

  background: var(--border);
  border-radius: 1px;
  margin: 0 0.2rem;

/* ─── Next Area ─── */
#next-area {

  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;

}

#next-area p {
  margin: 0 0 0.6rem;
  color: var(--muted);
  font-size: 0.9rem;

#next-title {
  color: var(--accent);
  font-weight: 600;
}

/* ─── Celebration ─── */
#celebration {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9998;
  overflow: hidden;
}

.confetti {
  position: fixed;
  z-index: 9999;
  animation: fall linear forwards;
  border-radius: 2px;
}

@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* ─── Mobile ─── */
@media (max-width: 768px) {
  #main {
    flex-direction: column;
  }

  #sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    height: calc(100vh - 56px);
    width: 260px;
    transform: translateX(-100%);
    z-index: 90;
    border-right: 1px solid var(--border);
  }

  body.sidebar-open #sidebar {
    transform: translateX(0);
  }

  #content {
    padding: 1rem;
    max-width: 100%;
  }

  #sidebar-toggle {
    display: inline-flex;
  }

  .step-body {
    padding-left: 0;
  }
}

<script>
/* === SECTION 1: CORE ENGINE === */
/* Pure networking math functions. NO DOM ACCESS. NO console.log. */

/* ---------- Internal Helpers ---------- */
function ipToNum(ip) {
    const octets = ip.split('.').map(Number);
    return ((octets[0] << 24) | (octets[1] << 16) | (octets[2] << 8) | octets[3]) >>> 0;
}

function numToIp(num) {
    return [
        (num >>> 24) & 0xFF,
        (num >>> 16) & 0xFF,
        (num >>> 8) & 0xFF,
        num & 0xFF
    ].join('.');
}

/* ---------- IP / Binary conversions ---------- */
function ipToBin(ip) {
    return ip.split('.').map(Number).map(n => n.toString(2).padStart(8, '0'));
}

function binToIp(binStr) {
    const cleaned = String(binStr).replace(/[\s\.]/g, '');
    if (cleaned.length !== 32) return null;
    const octets = [];
    for (let i = 0; i < 32; i += 8) {
        octets.push(parseInt(cleaned.substring(i, i + 8), 2));
    }
    return octets.join('.');
}

/* ---------- Prefix / Mask conversions ---------- */
function prefixToMask(prefix) {
    const p = parseInt(prefix);
    if (isNaN(p) || p < 0 || p > 32) return null;
    const mask = [];
    for (let i = 0; i < 4; i++) {
        const bits = Math.min(8, Math.max(0, p - i * 8));
        mask.push((0xFF << (8 - bits)) & 0xFF);
    }
    return mask.join('.');
}

function maskToPrefix(mask) {
    if (!isValidMask(mask)) return -1;
    const octets = mask.split('.').map(Number);
    let prefix = 0;
    for (const o of octets) {
        let bits = 0;
        let v = o;
        while (v & 0x80) {
            bits++;
            v = (v << 1) & 0xFF;
        }
        prefix += bits;
        if (bits < 8) break;
    }
    return prefix;
}

function prefixToCidrTable() {
    const table = {};
    for (let p = 8; p <= 30; p++) {
        const total = Math.pow(2, 32 - p);
        table['/' + p] = {
            mask: prefixToMask(p),
            hosts: total - 2,
            total: total
        };
    }
    return table;
}

/* ---------- Network / Broadcast / Range ---------- */
function calcNetwork(ip, mask) {
    const ipOctets = ip.split('.').map(Number);
    const maskOctets = mask.split('.').map(Number);
    return ipOctets.map((o, i) => o & maskOctets[i]).join('.');
}

function calcBroadcast(ip, mask) {
    const ipOctets = ip.split('.').map(Number);
    const maskOctets = mask.split('.').map(Number);
    return ipOctets.map((o, i) => o | (255 - maskOctets[i])).join('.');
}

function calcRange(ip, mask) {
    const network = calcNetwork(ip, mask);
    const broadcast = calcBroadcast(ip, mask);
    const prefix = maskToPrefix(mask);
    const total = Math.pow(2, 32 - prefix);
    const usable = total - 2;
    const netNum = ipToNum(network);
    const bcNum = ipToNum(broadcast);
    let firstNum = (netNum + 1) >>> 0;
    let lastNum = (bcNum - 1) >>> 0;
    if (usable <= 0) {
        firstNum = netNum;
        lastNum = bcNum;
    }
    return {
        network: network,
        broadcast: broadcast,
        first: numToIp(firstNum),
        last: numToIp(lastNum),
        total: total,
        usable: usable
    };
}

/* ---------- Validation ---------- */
function isValidIp(ip) {
    const parts = ip.split('.');
    if (parts.length !== 4) return false;
    const nums = parts.map(Number);
    for (let i = 0; i < 4; i++) {
        if (!/^\d+$/.test(parts[i])) return false;
        if (nums[i] < 0 || nums[i] > 255) return false;
    }
    if (nums[0] === 0 && nums[1] === 0 && nums[2] === 0 && nums[3] === 0) return false;
    if (nums[0] === 255 && nums[1] === 255 && nums[2] === 255 && nums[3] === 255) return false;
    return true;
}

function isValidMask(mask) {
    const parts = mask.split('.');
    if (parts.length !== 4) return false;
    const nums = parts.map(Number);
    for (const n of nums) {
        if (isNaN(n) || n < 0 || n > 255) return false;
    }
    let foundZero = false;
    for (const n of nums) {
        const bin = n.toString(2).padStart(8, '0');
        for (const bit of bin) {
            if (bit === '0') foundZero = true;
            if (foundZero && bit === '1') return false;
        }
    }
    return true;
}

function isValidCidr(prefix) {
    const p = parseInt(prefix);
    return !isNaN(p) && p >= 0 && p <= 32;
}

/* ---------- Subnetting ---------- */
function calcSubnetCount(originalPrefix, newPrefix) {
    return Math.pow(2, newPrefix - originalPrefix);
}

function calcHostsPerSubnet(prefix) {
    return Math.pow(2, 32 - prefix) - 2;
}

function calcBlockSize(prefix) {
    return Math.pow(2, 32 - prefix);
}

/* ---------- Supernetting ---------- */
function calcSupernet(networks) {
    if (!networks || networks.length === 0) return null;
    const nums = networks.map(cidr => {
        const [ipStr, preStr] = cidr.split('/');
        const octets = ipStr.split('.').map(Number);
        const ipNum = ((octets[0] << 24) | (octets[1] << 16) | (octets[2] << 8) | octets[3]) >>> 0;
        return { ipNum, prefix: parseInt(preStr) || 0 };
    });
    let xor = 0;
    for (let i = 1; i < nums.length; i++) {
        xor |= (nums[0].ipNum ^ nums[i].ipNum);
    }
    let prefix = 32;
    if (xor !== 0) {
        let d = xor;
        let msbPos = -1;
        while (d) { d >>= 1; msbPos++; }
        prefix = 31 - msbPos;
    }
    const minProvidedPrefix = Math.min(...nums.map(n => n.prefix));
    prefix = Math.min(prefix, minProvidedPrefix);
    const mask = prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix));
    const netNum = (nums[0].ipNum & mask) >>> 0;
    const ip = [
        (netNum >>> 24) & 0xFF,
        (netNum >>> 16) & 0xFF,
        (netNum >>> 8) & 0xFF,
        netNum & 0xFF
    ].join('.');
    return ip + '/' + prefix;
}

/* ---------- IPv6 ---------- */
function expandIPv6(ip) {
    if (!isValidIPv6(ip)) return null;
    const parts = ip.split('::');
    const left = parts[0] ? parts[0].split(':') : [];
    const right = parts[1] !== undefined ? parts[1].split(':') : [];
    const missing = 8 - left.length - right.length;
    const zeros = Array(missing).fill('0000');
    const groups = left.concat(zeros, right);
    return groups.map(g => g.padStart(4, '0')).join(':');
}

function compressIPv6(ip) {
    const expanded = expandIPv6(ip);
    if (!expanded) return null;
    let groups = expanded.split(':').map(g => parseInt(g, 16).toString(16));
    let bestStart = -1, bestLen = 0;
    let curStart = -1, curLen = 0;
    for (let i = 0; i < groups.length; i++) {
        if (groups[i] === '0') {
            if (curStart === -1) curStart = i;
            curLen++;
            if (curLen > bestLen) {
                bestLen = curLen;
                bestStart = curStart;
            }
        } else {
            curStart = -1;
            curLen = 0;
        }
    }
    if (bestLen > 1) {
        const prefix = groups.slice(0, bestStart).join(':');
        const suffix = groups.slice(bestStart + bestLen).join(':');
        let res = '';
        if (prefix) res += prefix + ':';
        res += ':';
        if (suffix) res += suffix;
        return res;
    }
    return groups.join(':');
}

function isValidIPv6(ip) {
    if (!ip || typeof ip !== 'string') return false;
    if (ip.split('::').length > 2) return false;
    const parts = ip.split('::');
    let groups = [];
    for (let i = 0; i < parts.length; i++) {
        if (parts[i] === '') continue;
        const g = parts[i].split(':');
        for (const h of g) {
            if (h === '') return false;
            if (h.length > 4) return false;
            if (!/^[0-9a-fA-F]+$/.test(h)) return false;
        }
        groups = groups.concat(g);
    }
    if (parts.length === 1) {
        if (groups.length !== 8) return false;
    } else {
        if (groups.length >= 8) return false;
    }
    return true;
}

function ipv6Type(ip) {
    const expanded = expandIPv6(ip);
    if (!expanded) return 'Invalid';
    if (expanded === '0000:0000:0000:0000:0000:0000:0000:0001') return 'Loopback';
    const firstGroup = parseInt(expanded.substring(0, 4), 16);
    if ((firstGroup & 0xFF00) === 0xFF00) return 'Multicast';
    if ((firstGroup & 0xFFC0) === 0xFE80) return 'Link-Local';
    if ((firstGroup & 0xE000) === 0x2000) return 'Global Unicast';
    return 'Anycast';
}

function ipv6SubnetPrefixes() {
    return {
        '/48': { name: 'Site', subnets: '65,536 /64s', hosts: '2^8a addresses' },
        '/56': { name: 'Small Site', subnets: '256 /64s', hosts: '2^72 addresses' },
        '/64': { name: 'LAN', subnets: '1', hosts: '2^64 addresses' },
        '/128': { name: 'Host', subnets: 'N/A', hosts: '1' }
    };
}

function eui64(mac) {
    if (!mac) return null;
    const parts = mac.split(/[:-]/);
    if (parts.length !== 6) return null;
    const bytes = parts.map(p => parseInt(p, 16));
    if (bytes.some(b => isNaN(b) || b < 0 || b > 255)) return null;
    bytes[0] ^= 0x02;
    const g1 = ((bytes[0] << 8) | bytes[1]).toString(16).padStart(4, '0');
    const g2 = ((bytes[2] << 8) | 0xFF).toString(16).padStart(4, '0');
    const g3 = ((0xFE << 8) | bytes[3]).toString(16).padStart(4, '0');
    const g4 = ((bytes[4] << 8) | bytes[5]).toString(16).padStart(4, '0');
    return (g1 + ':' + g2 + ':' + g3 + ':' + g4).toLowerCase();
}

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randIdx(arr) {
    return rand(0, arr.length - 1);
}

    if (firstOctet >= 1 && firstOctet <= 126) {
        cls = 'A'; defaultMask = '255.0.0.0'; prefix = '/8'; range = '1 – 126';
    } else if (firstOctet >= 128 && firstOctet <= 191) {
        cls = 'B'; defaultMask = '255.255.0.0'; prefix = '/16'; range = '128 – 191';
    } else if (firstOctet >= 192 && firstOctet <= 223) {
        cls = 'C'; defaultMask = '255.255.255.0'; prefix = '/24'; range = '192 – 223';
    } else if (firstOctet >= 224 && firstOctet <= 239) {
        cls = 'D (Multicast)'; defaultMask = 'N/A'; prefix = 'N/A'; range = '224 – 239';
    } else if (firstOctet >= 240) {
        cls = 'E (Experimental)'; defaultMask = 'N/A'; prefix = 'N/A'; range = '240 – 255';
    }
    let html = '<strong>IP:</strong> ' + ip + '<br>';
    html += '<strong>Class:</strong> ' + cls + '<br>';

/* d7 - VLSM Allocator */
function d7Show() {
    const ip = _el('d7-ip').value.trim();
    const mask = _el('d7-mask').value.trim();
    const hostsStr = _el('d7-hosts').value.trim();
    if (!isValidIp(ip) || !isValidMask(mask)) { _error('d7-result', 'Invalid IP or Mask.'); return; }
    const reqs = hostsStr.split(/[,\s]+/).map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0);
    if (reqs.length === 0) { _error('d7-result', 'Enter host requirements (e.g. 100, 50, 10).'); return; }
    reqs.sort((a, b) => b - a);
    const origPrefix = maskToPrefix(mask);
    let current = ipToNum(calcNetwork(ip, mask));
    let html = '<table style="width:100%;border-collapse:collapse"><thead><tr>';
    html += '<th style="text-align:left">Needed</th><th style="text-align:left">Prefix</th>';
    html += '<th style="text-align:left">Network</th><th style="text-align:left">Mask</th>';
    html += '<th style="text-align:left">Usable Range</th></tr></thead><tbody>';
    for (const h of reqs) {
        let p = 32 - Math.ceil(Math.log2(h + 2));
        if (p < origPrefix) {
            html += '<tr><td colspan="5">ERROR: ' + h + ' hosts needs /' + p + ', pool is only /' + origPrefix + '</td></tr>';
            continue;
        }
        if (p > 30) p = 30;
        const block = calcBlockSize(p);
        if ((current % block) !== 0) {
            current = (Math.ceil(current / block) * block) >>> 0;
        }
        const netStr = numToIp(current);
        const m = prefixToMask(p);
        const r = calcRange(netStr, m);
        html += '<tr><td>' + h + '</td><td>/' + p + '</td><td>' + netStr + '/' + p + '</td>';
        html += '<td>' + m + '</td><td>' + r.first + ' - ' + r.last + '</td></tr>';
        current = (current + block) >>> 0;
    }
    html += '</tbody></table>';
    _show('d7-result', html);
}

    const newPrefix = 64; // Standard LAN boundary

    const subnetBits = 64 - origPrefix;

<script>
/***********************************
 * SubnetMaster v2 — UI Framework
 * Section 2: State, Sidebar, Loader,
 * Exercise System, & Celebration
 ***********************************/

/* ───── State ───── */
// TOTAL will be set by lesson data script

let state = {
  current: 1,
  completed: new Set(),
  wrongAttempts: {}
};

function load() {
  try {
    const raw = localStorage.getItem('subnet_v2_progress');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (typeof parsed.current === 'number') state.current = parsed.current;
      if (Array.isArray(parsed.completed)) {
        state.completed = new Set(parsed.completed);
      }
      if (parsed.wrongAttempts && typeof parsed.wrongAttempts === 'object') {
        state.wrongAttempts = parsed.wrongAttempts;
      }
    }
  } catch (e) {
    console.warn('subnet v2: failed to load progress', e);
  }
}

function save() {
  try {
    localStorage.setItem('subnet_v2_progress', JSON.stringify({
      current: state.current,
      completed: Array.from(state.completed),
      wrongAttempts: state.wrongAttempts
    }));
  } catch (e) {
    console.warn('subnet v2: failed to save progress', e);
  }
}

/* ───── DOM refs ───── */
const $ = (sel) => document.querySelector(sel);

const els = {
  sidebar:         document.getElementById('sidebar'),
  contentInner:    document.getElementById('content-inner'),
  exerciseArea:    document.getElementById('exercise-area'),
  nextArea:        document.getElementById('next-area'),
  nextBtn:         document.getElementById('next-btn'),
  nextTitle:       document.getElementById('next-title'),
  progressFill:    document.getElementById('progress-fill'),
  progressPct:     document.getElementById('progress-pct'),
  celebration:     document.getElementById('celebration'),
  sidebarToggle:   document.getElementById('sidebar-toggle')
};

/* ───── Sidebar ───── */
function renderSidebar() {
  if (!els.sidebar || typeof MODULES === 'undefined') return;

  let html = '';
  let globalLessonNum = 0;

  MODULES.forEach((mod, modIdx) => {
    html += `<div class="mod-group" data-mod="${modIdx}">`;
    html +=   `<div class="mod-title">${escapeHtml(mod.title)}</div>`;
    html +=   `<ul class="mod-list">`;

    mod.lessons.forEach((lesson, lessonIdx) => {
      globalLessonNum++;
      const isActive  = globalLessonNum === state.current;
      const isDone    = state.completed.has(globalLessonNum);
      const isLocked  = globalLessonNum > 1 && !state.completed.has(globalLessonNum - 1);

      let icon = '';
      if (isDone)   icon = '✅';
      else if (isLocked) icon = '🔒';
      else               icon = `<span class="lesson-num-circle">${globalLessonNum}</span>`;

      const cls = ['lesson-btn'];
      if (isActive) cls.push('active');
      if (isDone)   cls.push('completed');
      if (isLocked) cls.push('locked');

      html += '<li class="' + cls.join(' ') + '">' +
                '<button onclick="loadLesson(' + globalLessonNum + ')" ' + (isLocked ? 'disabled' : '') + '>' +
                  icon + ' ' + escapeHtml(lesson.title) +
                '</button></li>';
    });

    html +=   `</ul>`;
    html += `</div>`;
  });

  els.sidebar.innerHTML = html;
}

/* ───── Lesson Loader ───── */
function loadLesson(id) {
  if (id < 1 || id > TOTAL) return;
  state.current = id;
  save();

  // clear previous content & exercise
  els.contentInner.innerHTML = '';
  els.exerciseArea.innerHTML = '';
  els.exerciseArea.style.display = 'none';
  els.nextArea.style.display = 'none';
  window._exerciseData = null;

  // find lesson data
  let targetLesson = null;
  let globalNum = 0;
  outer: for (const mod of MODULES) {
    for (const l of mod.lessons) {
      globalNum++;
      if (globalNum === id) { targetLesson = l; break outer; }
    }
  }
  if (!targetLesson) return;

  // render steps
  const steps = targetLesson.steps || [];
  steps.forEach((step, idx) => {
    els.contentInner.insertAdjacentHTML('beforeend', renderStep(step, idx, steps.length));
  });

  // wire demo events AFTER DOM injection
  steps.forEach((step, idx) => {
    if (step.type === 'demo' && typeof step.init === 'function') {
      step.init();
    }
  });

  // init exercise if the last step is one
  if (steps.length > 0 && steps[steps.length - 1].type === 'exercise') {
    setTimeout(initExercise, 50);
  }

  updateProgress();
  renderSidebar();
  scrollToTop();
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (els.contentInner) els.contentInner.scrollTop = 0;
}

/* ───── Step Renderer ───── */
function renderStep(step, index, totalSteps) {
  const stepNum = index + 1;
  let cardBody = '';

  switch (step.type) {
    case 'explain':
      cardBody = `<div class="info-card">${step.html || ''}</div>`;
      break;
    case 'demo':
      cardBody = `<div class="demo-card">${step.html || ''}</div>`;
      break;
    case 'exercise':
      cardBody = `<div class="exercise-card">${step.html || ''}</div>`;
      break;
    default:
      cardBody = `<div class="info-card">${step.html || ''}</div>`;
  }

  return `<div class="step" data-step="${index}" data-type="${step.type}">` +
           `<div class="step-header">` +
             `<span class="step-num-circle">${stepNum}</span>` + ' ' +
             `<span class="step-label">${escapeHtml(step.label || step.type)}</span>` +
             `<span class="step-meta">${stepNum}/${totalSteps}</span>` +
           `</div>` +
           `<div class="step-body">${cardBody}</div>` +
         `</div>`;
}

/* ───── Progress ───── */
function updateProgress() {
  const done = state.completed.size;
  const pct  = Math.round((done / TOTAL) * 100);
  if (els.progressFill) els.progressFill.style.width = pct + '%';
  if (els.progressPct)  els.progressPct.textContent = pct + '%';
}

/* ───── Exercise System ───── */
function initExercise() {
  // find exercise step
  const lastStepCard = els.contentInner.querySelector('.step[data-type="exercise"]');
  if (!lastStepCard) return;

  // retrieve lesson object to call generate()
  let targetLesson = null;
  let globalNum = 0;
  outer: for (const mod of MODULES) {
    for (const l of mod.lessons) {
      globalNum++;
      if (globalNum === state.current) { targetLesson = l; break outer; }
    }
  }
  if (!targetLesson) return;

  const steps = targetLesson.steps || [];
  const exerciseStep = steps[steps.length - 1];
  if (!exerciseStep || exerciseStep.type !== 'exercise' || typeof exerciseStep.generate !== 'function') return;

  const data = exerciseStep.generate();
  window._exerciseData = data;

  // render exercise UI into #exercise-area
  let html = `<div class="exercise-box">`;
  html +=    `<div class="question">${data.question || ''}</div>`;
  html +=    `<div class="fields">`;

  data.fields.forEach((f) => {
    html +=  `<div class="field-wrap">` +
               `<label for="ex-${f.id}">${escapeHtml(f.label)}</label>` +
               `<input type="text" id="ex-${f.id}" class="ex-input" autocomplete="off" spellcheck="false">` +
             `</div>`;
  });

  html +=    `</div>`;
  html +=    `<div class="ex-actions">` +
               `<button id="check-btn" class="btn btn-primary">Check</button>` +
               `<button id="hint-btn" class="btn btn-hint" style="display:none">Hint</button>` +
             `</div>`;
  html +=    `<div id="feedback" class="feedback" style="display:none"></div>`;
  html +=  `</div>`;

  els.exerciseArea.innerHTML = html;
  els.exerciseArea.style.display = 'block';

  // attach listeners
  const checkBtn = document.getElementById('check-btn');
  const hintBtn  = document.getElementById('hint-btn');
  if (checkBtn) checkBtn.addEventListener('click', checkExercise);
  if (hintBtn)  hintBtn.addEventListener('click', showHint);

  // allow Enter key
  const inputs = els.exerciseArea.querySelectorAll('input[type="text"]');
  inputs.forEach((inp) => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkExercise();
    });
  });
}

function checkExercise() {
  if (!window._exerciseData) return;

  const data = window._exerciseData;
  const fields = data.fields;
  const feedbackEl = document.getElementById('feedback');
  const hintBtn    = document.getElementById('hint-btn');

  let allCorrect = true;
  const wrongIds = [];

  fields.forEach((f) => {
    const el = document.getElementById(`ex-${f.id}`);
    if (!el) return;
    const val = el.value.trim();
    const ok = typeof f.check === 'function' ? f.check(val) : false;
    el.classList.remove('correct', 'wrong');
    if (ok) {
      el.classList.add('correct');
    } else {
      el.classList.add('wrong');
      allCorrect = false;
      wrongIds.push(f.id);
    }
  });

  if (allCorrect) {
    // passed
    if (feedbackEl) {
      feedbackEl.className = 'feedback pass';
      feedbackEl.style.display = 'block';
      feedbackEl.textContent = data.successMsg || 'Correct! Great job.';
    }

    // mark complete
    if (!state.completed.has(state.current)) {
      state.completed.add(state.current);
      save();
      updateProgress();
      renderSidebar();
    }

    celebrate();
    showNextButton();
    if (hintBtn) hintBtn.style.display = 'none';
  } else {
    // failed
    if (feedbackEl) {
      feedbackEl.className = 'feedback fail';
      feedbackEl.style.display = 'block';
      feedbackEl.textContent = data.failMsg || 'Not quite — try again.';
    }

    // track wrong attempts
    const lessonId = state.current;
    state.wrongAttempts[lessonId] = (state.wrongAttempts[lessonId] || 0) + 1;
    save();

    // show hint button after 3 tries
    if (hintBtn && state.wrongAttempts[lessonId] >= 3) {
      hintBtn.style.display = 'inline-block';
    }
  }
}

function showHint() {
  if (!window._exerciseData) return;
  const data = window._exerciseData;
  const feedbackEl = document.getElementById('feedback');
  if (data.hint && feedbackEl) {
    feedbackEl.style.display = 'block';
    feedbackEl.innerHTML += `<div class="hint-text">💡 Hint: ${escapeHtml(data.hint)}</div>`;
  }
}

function showNextButton() {
  if (!els.nextArea || !els.nextTitle) return;
  let nextId = state.current + 1;
  if (nextId > TOTAL) {
    els.nextArea.style.display = 'none';
    return;
  }

  let nextTitle = 'Finish';
  let globalNum = 0;
  outer: for (const mod of MODULES) {
    for (const l2 of mod.lessons) {
      globalNum++;
      if (globalNum === nextId) { nextTitle = l2.title; break outer; }
    }
  }

  els.nextTitle.textContent = nextTitle;
  els.nextArea.style.display = 'block';
  els.nextBtn.onclick = nextLesson;

  // auto-scroll if needed
  setTimeout(() => {
    els.nextArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

/* ───── Celebration ───── */
function celebrate() {
  if (!els.celebration) return;
  const colors = ['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#f72585','#4cc9f0'];
  const count  = Math.floor(Math.random() * 31) + 50; // 50–80

  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'confetti';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.top  = '-10px';
    d.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    d.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
    d.style.width  = (Math.random() * 8 + 6) + 'px';
    d.style.height = (Math.random() * 8 + 6) + 'px';
    d.style.position = 'fixed';
    d.style.zIndex = '9999';
    d.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    els.celebration.appendChild(d);
  }

  setTimeout(() => {
    els.celebration.innerHTML = '';
  }, 3000);
}

/* ───── Next Lesson ───── */
function nextLesson() {
  // clear exercise and next area before loading next lesson
  els.exerciseArea.innerHTML = '';
  els.exerciseArea.style.display = 'none';
  els.nextArea.style.display = 'none';
  window._exerciseData = null;

  const nextId = state.current + 1;
  if (nextId <= TOTAL) {
    loadLesson(nextId);
  }
}

/* ───── Sidebar Toggle ───── */
if (els.sidebarToggle) {
  els.sidebarToggle.addEventListener('click', () => {
    document.body.classList.toggle('sidebar-open');
  });
}

/* ───── Utility ───── */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

  <ul>
    <li><strong>Leading zeros can be dropped</strong> within each hextet: 0db8 → db8, 0370 → 370.</li>

  <p>Shortened:</p>
  <pre style="background:#111;padding:10px;border-radius:6px;margin-top:8px;">2001:db8:85a3::8a2e:370:7334</pre>

  <pre style="background:#111;padding:10px;border-radius:6px;margin-top:8px;">|     48 bits     | 16 bits  |      64 bits       |

Insert:     A4:83:E7:FF:FE:2B:CF:9C
